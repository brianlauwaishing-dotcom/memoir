services:
  postgres:
    image: 'postgres:16-alpine'
    environment:
      POSTGRES_DB: memoir
      POSTGRES_USER: memoir
      POSTGRES_PASSWORD: memoir
    ports:
      - '5432:5432'
    volumes:
      - memoir_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U memoir -d memoir']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  memoir_pg_data:
